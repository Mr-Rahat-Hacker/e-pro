spring:
  application:
    name: enterprise-eprocurement-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eprocurement}
    username: ${DB_USERNAME:eproc}
    password: ${DB_PASSWORD:eproc}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: eproc
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    issuer: enterprise-eprocurement
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:30}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
